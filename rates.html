<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rates - CoinCubby Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="rates.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="8" fill="#3B82F6"/>
                        <path d="M20 10C14.48 10 10 14.48 10 20C10 25.52 14.48 30 20 30C25.52 30 30 25.52 30 20C30 14.48 25.52 10 20 10ZM20 28C15.58 28 12 24.42 12 20C12 15.58 15.58 12 20 12C24.42 12 28 15.58 28 20C28 24.42 24.42 28 20 28Z" fill="white"/>
                    </svg>
                    <span>CoinCubby</span>
                </div>
                <p class="text-muted">Admin Panel</p>
            </div>

            <nav class="nav-menu">
                <div class="nav-group">
                    <a href="index.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>Overview</span>
                    </a>
                    <a href="lockers.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11"></rect>
                            <path d="M7 11V7a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v4"></path>
                        </svg>
                        <span>Lockers</span>
                    </a>
                    <a href="customers.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>Customers</span>
                    </a>
                    <a href="transactions.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                        <span>Transactions</span>
                    </a>
                    <a href="rates.html" class="nav-item active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg>
                        <span>Rates</span>
                    </a>
                    <a href="reports.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span>Reports</span>
                    </a>
                    <a href="auditlog.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="1"></circle>
                            <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6m-17.78 7.78l4.24-4.24m2.12-2.12l4.24-4.24"></path>
                        </svg>
                        <span>Audit Log</span>
                    </a>
                </div>
            </nav>

            <div class="user-profile">
                <div class="avatar">B</div>
                <div class="user-info">
                    <p class="user-name">Billy Rebate</p>
                    <p class="user-role">Admin</p>
                </div>
                <a href="#" class="sign-out">Sign out</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <h1>Payment Rates</h1>
                <p class="subtitle">Configure hourly rates displayed on the machine.</p>
            </div>

            <!-- Rates Form Container -->
            <div class="rates-container">
                <form id="ratesForm" class="rates-form">
                    <!-- Small Locker Rate -->
                    <div class="rate-section">
                        <div class="rate-title-section">
                            <h3 class="rate-title">Small</h3>
                            <p class="rate-description">shoes / small pack</p>
                        </div>
                        <div class="rate-inputs">
                            <div class="input-group">
                                <label for="smallRate">Rate per hour (₱)</label>
                                <input type="number" id="smallRate" name="smallRate" class="form-input" value="10" min="0" step="0.01">
                            </div>
                            <div class="input-group">
                                <label for="smallMinimum">Minimum charge (₱)</label>
                                <input type="number" id="smallMinimum" name="smallMinimum" class="form-input" value="10" min="0" step="0.01">
                            </div>
                        </div>
                    </div>

                    <!-- Medium Locker Rate -->
                    <div class="rate-section">
                        <div class="rate-title-section">
                            <h3 class="rate-title">Medium</h3>
                            <p class="rate-description">helmet / backpack</p>
                        </div>
                        <div class="rate-inputs">
                            <div class="input-group">
                                <label for="mediumRate">Rate per hour (₱)</label>
                                <input type="number" id="mediumRate" name="mediumRate" class="form-input" value="20" min="0" step="0.01">
                            </div>
                            <div class="input-group">
                                <label for="mediumMinimum">Minimum charge (₱)</label>
                                <input type="number" id="mediumMinimum" name="mediumMinimum" class="form-input" value="20" min="0" step="0.01">
                            </div>
                        </div>
                    </div>

                    <!-- Large Locker Rate -->
                    <div class="rate-section">
                        <div class="rate-title-section">
                            <h3 class="rate-title">Large</h3>
                            <p class="rate-description">blue jug / luggage</p>
                        </div>
                        <div class="rate-inputs">
                            <div class="input-group">
                                <label for="largeRate">Rate per hour (₱)</label>
                                <input type="number" id="largeRate" name="largeRate" class="form-input" value="35" min="0" step="0.01">
                            </div>
                            <div class="input-group">
                                <label for="largeMinimum">Minimum charge (₱)</label>
                                <input type="number" id="largeMinimum" name="largeMinimum" class="form-input" value="35" min="0" step="0.01">
                            </div>
                        </div>
                    </div>

                    <!-- Save Button -->
                    <button type="submit" class="btn-save-rates">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        Save Rates
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="db-operations.js"></script>
    <script>
        (function() {
            const auth = localStorage.getItem('coincubby_auth');
            if (!auth) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <script src="script.js"></script>
    <script src="rates.js"></script>

</body>
</html>
