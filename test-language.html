<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        select {
            padding: 10px;
            font-size: 16px;
            margin: 10px 0;
        }
        h2 {
            color: #5cb85c;
        }
    </style>
</head>
<body>
    <h1>CoinCubby Language System Test</h1>
    
    <div class="test-section">
        <h2>Language Selector</h2>
        <select id="test-language-select">
            <option value="en">English</option>
            <option value="tl">Tagalog</option>
        </select>
    </div>

    <div class="test-section">
        <h2>Navigation Tests</h2>
        <p><strong data-i18n="nav.overview">Overview</strong></p>
        <p><strong data-i18n="nav.lockers">Lockers</strong></p>
        <p><strong data-i18n="nav.customers">Customers</strong></p>
        <p><strong data-i18n="nav.transactions">Transactions</strong></p>
    </div>

    <div class="test-section">
        <h2>Status Tests</h2>
        <p><strong data-i18n="status.available">Available</strong></p>
        <p><strong data-i18n="status.occupied">Occupied</strong></p>
        <p><strong data-i18n="status.payment">Payment Required</strong></p>
        <p><strong data-i18n="status.maintenance">Maintenance</strong></p>
    </div>

    <div class="test-section">
        <h2>Profile Tests</h2>
        <p><strong data-i18n="profile.personalInfo">Personal Information</strong></p>
        <p><strong data-i18n="profile.changePassword">Change Password</strong></p>
        <p><strong data-i18n="profile.language">Language</strong></p>
        <p><strong data-i18n="profile.appearance">Appearance</strong></p>
    </div>

    <div class="test-section">
        <h2>Current Language</h2>
        <p id="current-lang-display">Loading...</p>
    </div>

    <script src="./js/language.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const langSelect = document.getElementById('test-language-select');
            const langDisplay = document.getElementById('current-lang-display');
            
            // Set initial value
            langSelect.value = languageManager.getCurrentLanguage();
            langDisplay.textContent = `Current: ${languageManager.getCurrentLanguage()}`;
            
            // Handle change
            langSelect.addEventListener('change', function(e) {
                console.log('Changing language to:', e.target.value);
                languageManager.setLanguage(e.target.value);
                langDisplay.textContent = `Current: ${e.target.value}`;
            });
            
            // Listen for language changes
            window.addEventListener('languageChanged', function(e) {
                console.log('Language changed event:', e.detail);
                langDisplay.textContent = `Current: ${e.detail.language}`;
            });
            
            console.log('Language system loaded:', typeof languageManager !== 'undefined');
            console.log('Current language:', languageManager.getCurrentLanguage());
        });
    </script>
</body>
</html>
