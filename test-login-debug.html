<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Debug Tool</title>
<style>
  body { font-family: monospace; padding: 30px; background: #0f172a; color: #e2e8f0; }
  h2 { color: #10b981; }
  input, button { padding: 8px 12px; margin: 4px; border-radius: 6px; border: 1px solid #334155; }
  input { background: #1e293b; color: #f1f5f9; width: 280px; }
  button { background: #10b981; color: white; border: none; cursor: pointer; }
  button.danger { background: #ef4444; }
  pre { background: #1e293b; padding: 16px; border-radius: 8px; overflow: auto; white-space: pre-wrap; word-break: break-all; max-height: 400px; border: 1px solid #334155; }
  .ok  { color: #4ade80; }
  .err { color: #f87171; }
  .sec { margin-top: 24px; border-top: 1px solid #334155; padding-top: 16px; }
</style>
</head>
<body>

<h2>🔍 CoinCubby Login Debug Tool</h2>

<div>
  <input id="email"    placeholder="admin@coincubby.com" value="admin@coincubby.com">
  <input id="password" placeholder="your password" type="password">
  <button onclick="testLogin()">Test Login Query</button>
  <button onclick="checkAuth()">Check Saved Auth</button>
  <button class="danger" onclick="clearAuth()">Clear Auth</button>
</div>

<pre id="out">Click a button to start…</pre>

<div class="sec">
  <button onclick="testConnection()">Test DB Connection</button>
  <button onclick="listAdmins()">List All Admins (no passwords)</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const URL = "https://cjuimxgxovdmijuenagr.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdWlteGd4b3ZkbWlqdWVuYWdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzQ0OTEsImV4cCI6MjA5MjAxMDQ5MX0.t6ixuFiD2iYzrNZsc1QjG3gpdTdBuMY37qTKzwxdg18";
const db = supabase.createClient(URL, KEY, { auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }});

const out = document.getElementById('out');
const log = (msg, cls='') => { out.innerHTML += `<span class="${cls}">${msg}</span>\n`; };
const clear = () => { out.textContent = ''; };

async function testConnection() {
  clear();
  log('Testing DB connection…');
  try {
    const { data, error } = await db.from('admin').select('count').limit(1);
    if (error) { log('❌ DB error: ' + JSON.stringify(error), 'err'); }
    else        { log('✅ DB connected OK', 'ok'); }
  } catch(e) { log('❌ Exception: ' + e.message, 'err'); }
}

async function testLogin() {
  clear();
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  log(`Testing login: ${email}`);

  try {
    // Step 1: check email exists
    log('\n── Step 1: find admin by email ──');
    const { data: byEmail, error: e1 } = await db
      .from('admin').select('id, email, full_name, password').eq('email', email).maybeSingle();

    if (e1) { log('❌ Query error: ' + JSON.stringify(e1), 'err'); return; }
    if (!byEmail) { log('❌ No admin found with email: ' + email, 'err'); return; }

    log('✅ Admin row found', 'ok');
    log('   id:        ' + byEmail.id);
    log('   email:     ' + byEmail.email);
    log('   full_name: ' + byEmail.full_name);
    log('   password stored (length): ' + (byEmail.password ? byEmail.password.length : 'null/empty'));

    // Step 2: compare password
    log('\n── Step 2: password comparison ──');
    log('   Entered length:  ' + password.length);
    log('   Stored  length:  ' + (byEmail.password || '').length);

    if (byEmail.password === password) {
      log('✅ Password MATCHES — login should succeed!', 'ok');

      // Step 3: simulate storing auth
      const auth = { isAuthenticated: true, id: byEmail.id, email: byEmail.email, name: byEmail.full_name };
      localStorage.setItem('coincubby_auth', JSON.stringify(auth));
      log('\n✅ Auth saved to localStorage', 'ok');
      log('   Would redirect to: pages/index.html');
    } else {
      log('❌ Password DOES NOT MATCH', 'err');
      log('   Stored password (masked): ' + (byEmail.password || '').replace(/./g, '*'));
      log('\n💡 Fix: run this SQL in Supabase dashboard:', 'err');
      log(`   UPDATE admin SET password = '${password}' WHERE email = '${email}';`);
    }
  } catch(e) { log('❌ Exception: ' + e.message, 'err'); }
}

async function listAdmins() {
  clear();
  log('Listing all admin accounts (no passwords shown)…');
  try {
    const { data, error } = await db.from('admin').select('id, email, full_name, role, last_login');
    if (error) { log('❌ ' + JSON.stringify(error), 'err'); return; }
    if (!data || data.length === 0) { log('⚠️ No admin accounts found!', 'err'); return; }
    log('✅ Found ' + data.length + ' admin(s):\n', 'ok');
    data.forEach((a, i) => {
      log(`[${i+1}] email: ${a.email}`);
      log(`     name:  ${a.full_name || '(empty)'}`);
      log(`     role:  ${a.role || '(empty)'}`);
      log(`     last:  ${a.last_login || 'never'}\n`);
    });
  } catch(e) { log('❌ Exception: ' + e.message, 'err'); }
}

function checkAuth() {
  clear();
  const raw = localStorage.getItem('coincubby_auth');
  if (!raw) { log('⚠️ No auth in localStorage', 'err'); return; }
  try {
    const auth = JSON.parse(raw);
    log('✅ Auth found:', 'ok');
    log(JSON.stringify(auth, null, 2));
  } catch(e) { log('❌ Corrupt auth data: ' + raw, 'err'); }
}

function clearAuth() {
  localStorage.removeItem('coincubby_auth');
  clear();
  log('✅ Auth cleared from localStorage', 'ok');
}
</script>
</body>
</html>
