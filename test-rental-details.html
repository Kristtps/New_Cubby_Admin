<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Rental Details - CoinCubby</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 20px; }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid #4DAA63;
            border-radius: 4px;
        }
        .test-section h3 {
            margin: 0 0 10px 0;
            color: #4DAA63;
        }
        button {
            background: #4DAA63;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #3d8f52;
        }
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        .success { color: #4DAA63; font-weight: bold; }
        .error { color: #ef4444; font-weight: bold; }
        .warning { color: #f59e0b; font-weight: bold; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Rental Details Diagnostic Tool</h1>
        <p>This tool will help diagnose why rental details show N/A.</p>

        <div class="test-section">
            <h3>Step 1: Test Database Connection</h3>
            <button onclick="testConnection()">Test Supabase Connection</button>
        </div>

        <div class="test-section">
            <h3>Step 2: Test Locker Query</h3>
            <label>Enter Locker Number: </label>
            <input type="text" id="lockerNumber" value="M1" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            <button onclick="testLockerQuery()">Query Locker</button>
        </div>

        <div class="test-section">
            <h3>Step 3: Test Transaction Query</h3>
            <button onclick="testTransactionQuery()">Query Active Transactions</button>
        </div>

        <div class="test-section">
            <h3>Step 4: Test Customer Query</h3>
            <label>Enter Customer ID: </label>
            <input type="text" id="customerId" placeholder="uuid" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 300px;">
            <button onclick="testCustomerQuery()">Query Customer</button>
        </div>

        <div class="test-section">
            <h3>Step 5: Full Integration Test</h3>
            <button onclick="testFullIntegration()">Run Full Test</button>
        </div>

        <div id="results"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');

        function log(message, type = 'info') {
            const className = type === 'success' ? 'success' : type === 'error' ? 'error' : type === 'warning' ? 'warning' : '';
            const timestamp = new Date().toLocaleTimeString();
            resultsDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
        }

        function logJson(label, data) {
            resultsDiv.innerHTML += `<div><strong>${label}:</strong></div><pre>${JSON.stringify(data, null, 2)}</pre>`;
        }

        function clearResults() {
            resultsDiv.innerHTML = '<h3>Test Results:</h3>';
        }

        async function testConnection() {
            clearResults();
            log('Testing Supabase connection...');
            
            try {
                const client = window.supabaseClient || window.supabase;
                if (!client) {
                    log('❌ Supabase client not found!', 'error');
                    return;
                }
                
                log('✓ Supabase client exists', 'success');
                
                // Test a simple query
                const { data, error } = await client.from('lockers').select('count');
                
                if (error) {
                    log('❌ Database query failed: ' + error.message, 'error');
                    logJson('Error details', error);
                } else {
                    log('✓ Database connection successful!', 'success');
                    logJson('Response', data);
                }
            } catch (err) {
                log('❌ Exception: ' + err.message, 'error');
                console.error(err);
            }
        }

        async function testLockerQuery() {
            clearResults();
            const lockerNumber = document.getElementById('lockerNumber').value;
            log(`Testing locker query for: ${lockerNumber}`);
            
            try {
                const client = window.supabaseClient || window.supabase;
                
                const { data, error } = await client
                    .from('lockers')
                    .select('*, modules(name)')
                    .eq('locker_number', lockerNumber)
                    .single();
                
                if (error) {
                    log('❌ Locker query failed: ' + error.message, 'error');
                    logJson('Error details', error);
                } else if (!data) {
                    log('⚠️ No locker found with that number', 'warning');
                } else {
                    log('✓ Locker found!', 'success');
                    logJson('Locker data', data);
                }
            } catch (err) {
                log('❌ Exception: ' + err.message, 'error');
                console.error(err);
            }
        }

        async function testTransactionQuery() {
            clearResults();
            log('Testing transaction query for all active transactions...');
            
            try {
                const client = window.supabaseClient || window.supabase;
                
                const { data, error } = await client
                    .from('transactions')
                    .select(`
                        *,
                        customers (full_name, email, contact_number),
                        lockers (locker_number),
                        payments (amount, payment_method, payment_date)
                    `)
                    .eq('status', 'Active')
                    .limit(10);
                
                if (error) {
                    log('❌ Transaction query failed: ' + error.message, 'error');
                    logJson('Error details', error);
                } else if (!data || data.length === 0) {
                    log('⚠️ No active transactions found', 'warning');
                    
                    // Try to get ANY transaction
                    log('Checking for any transactions (any status)...');
                    const { data: anyData, error: anyError } = await client
                        .from('transactions')
                        .select('*')
                        .limit(5);
                    
                    if (anyData && anyData.length > 0) {
                        log(`Found ${anyData.length} transactions with various statuses`, 'warning');
                        logJson('Sample transactions', anyData);
                    } else {
                        log('⚠️ No transactions found in database at all', 'warning');
                    }
                } else {
                    log(`✓ Found ${data.length} active transaction(s)!`, 'success');
                    logJson('Transaction data', data);
                }
            } catch (err) {
                log('❌ Exception: ' + err.message, 'error');
                console.error(err);
            }
        }

        async function testCustomerQuery() {
            clearResults();
            const customerId = document.getElementById('customerId').value;
            
            if (!customerId) {
                log('⚠️ Please enter a customer ID', 'warning');
                return;
            }
            
            log(`Testing customer query for: ${customerId}`);
            
            try {
                const client = window.supabaseClient || window.supabase;
                
                const { data, error } = await client
                    .from('customers')
                    .select('*')
                    .eq('customer_id', customerId)
                    .single();
                
                if (error) {
                    log('❌ Customer query failed: ' + error.message, 'error');
                    logJson('Error details', error);
                } else if (!data) {
                    log('⚠️ No customer found with that ID', 'warning');
                } else {
                    log('✓ Customer found!', 'success');
                    logJson('Customer data', data);
                }
            } catch (err) {
                log('❌ Exception: ' + err.message, 'error');
                console.error(err);
            }
        }

        async function testFullIntegration() {
            clearResults();
            const lockerNumber = document.getElementById('lockerNumber').value;
            log('=== FULL INTEGRATION TEST ===');
            log(`Testing complete flow for locker: ${lockerNumber}`);
            
            try {
                const client = window.supabaseClient || window.supabase;
                
                // Step 1: Get locker
                log('Step 1: Fetching locker...');
                const { data: lockerData, error: lockerError } = await client
                    .from('lockers')
                    .select('locker_id, locker_number, status, size_type_id, module_id, modules(name)')
                    .eq('locker_number', lockerNumber)
                    .single();
                
                if (lockerError || !lockerData) {
                    log('❌ Failed to fetch locker', 'error');
                    if (lockerError) logJson('Locker error', lockerError);
                    return;
                }
                
                log('✓ Locker fetched successfully', 'success');
                logJson('Locker data', lockerData);
                
                // Step 2: Get transaction
                log('Step 2: Fetching active transaction...');
                const { data: transactionData, error: transactionError } = await client
                    .from('transactions')
                    .select(`
                        *,
                        payments (amount, payment_method, payment_date)
                    `)
                    .eq('locker_id', lockerData.locker_id)
                    .eq('status', 'Active')
                    .limit(1);
                
                if (transactionError) {
                    log('❌ Failed to fetch transaction', 'error');
                    logJson('Transaction error', transactionError);
                    return;
                }
                
                if (!transactionData || transactionData.length === 0) {
                    log('⚠️ No active transaction found for this locker', 'warning');
                    log(`Locker status is: ${lockerData.status}`);
                    
                    if (lockerData.status === 'Occupied') {
                        log('⚠️ WARNING: Locker is marked as Occupied but has no Active transaction!', 'error');
                        log('This is a data inconsistency issue.');
                    }
                    return;
                }
                
                const transaction = transactionData[0];
                log('✓ Transaction fetched successfully', 'success');
                logJson('Transaction data', transaction);
                
                // Step 3: Get customer
                log('Step 3: Fetching customer...');
                const { data: customerData, error: customerError } = await client
                    .from('customers')
                    .select('*')
                    .eq('customer_id', transaction.customer_id)
                    .single();
                
                if (customerError || !customerData) {
                    log('❌ Failed to fetch customer', 'error');
                    if (customerError) logJson('Customer error', customerError);
                    return;
                }
                
                log('✓ Customer fetched successfully', 'success');
                logJson('Customer data', customerData);
                
                // Final summary
                log('=== TEST COMPLETE ===', 'success');
                log(`Locker: ${lockerData.locker_number}`, 'success');
                log(`Customer: ${customerData.full_name}`, 'success');
                log(`Email: ${customerData.email}`, 'success');
                log(`Phone: ${customerData.contact_number}`, 'success');
                log(`Start Time: ${transaction.start_time}`, 'success');
                log(`Amount: ₱${transaction.payments?.[0]?.amount || 0}`, 'success');
                
            } catch (err) {
                log('❌ Exception: ' + err.message, 'error');
                console.error(err);
            }
        }

        // Auto-test connection on load
        window.addEventListener('load', () => {
            setTimeout(testConnection, 500);
        });
    </script>
</body>
</html>
