<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log - CoinCubby Admin Panel</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auditlog.css">
    <script>
        // Apply saved theme synchronously before page renders (prevents white flash)
        (function () {
            const STORAGE_KEY = 'coincubby_theme';
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                const theme = (saved === 'light' || saved === 'dark') ? saved : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo">
                    <img src="../assets/logo.png" alt="CoinCubby Logo" width="40" height="40"
                        style="border-radius: 50%;">
                    <span>CoinCubby</span>
                </div>
                <p class="text-muted">Admin</p>
            </div>

            <nav class="nav-menu">
                <div class="nav-group">
                    <a href="index.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>Overview</span>
                    </a>
                    <a href="lockers.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="11" width="18" height="11"></rect>
                            <path d="M7 11V7a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v4"></path>
                        </svg>
                        <span>Lockers</span>
                    </a>
                    <a href="customers.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>Customers</span>
                    </a>
                    <a href="transactions.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                        <span>Transactions</span>
                    </a>
                    <a href="rentals.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="1"></circle>
                            <path
                                d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6m-17.78 7.78l4.24-4.24m2.12-2.12l4.24-4.24">
                            </path>
                        </svg>
                        <span>Rentals</span>
                    </a>
                    <a href="inventory.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                        </svg>
                        <span>Inventory</span>
                    </a>
                    
                    <a href="rates.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z">
                            </path>
                        </svg>
                        <span>Rates</span>
                    </a>
                    <a href="reports.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span>Reports</span>
                    </a>
                    <a href="feedback.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                            </path>
                        </svg>
                        <span>Feedback</span>
                    </a>
                    <a href="auditlog.html" class="nav-item active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="1"></circle>
                            <path
                                d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6m-17.78 7.78l4.24-4.24m2.12-2.12l4.24-4.24">
                            </path>
                        </svg>
                        <span>Audit Log</span>
                    </a>
                </div>
            </nav>



            <a href="profile.html" class="user-profile">
                <div class="avatar" id="sidebar-avatar">A</div>
                <div class="user-info">
                    <p class="user-name" id="sidebar-name"></p>
                    <p class="user-role">Admin</p>
                </div>
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header" style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h1>Audit Log</h1>
                    <p class="subtitle">Every action, tracked in real time.</p>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 8px; align-items: center;">
                    <div style="position: relative;">
                        <input type="text" id="auditlog-search"
                            placeholder="Search by action, description, user, or category..."
                            style="width: 300px; padding: 10px 12px 10px 40px; border: 1px solid var(--color-border); border-radius: 8px; font-size: 14px; color: var(--color-dark); background: var(--color-panel-bg); transition: border-color 0.2s;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); pointer-events: none;">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </div>
                    <select id="auditlog-date-filter"
                        onchange="setAuditDateFilter(this.value)"
                        style="padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 8px; font-size: 14px; font-weight: 600; color: var(--color-text); background: var(--color-panel-bg); cursor: pointer; outline: none; transition: border-color 0.2s;">
                        <option value="all">All Time</option>
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month">This Month</option>
                    </select>
                </div>
            </header>

            <div class="auditlog-page-wrapper">
                <!-- Audit Log Feed -->
                <div class="auditlog-container">
                    <div id="auditLogList" class="auditlog-feed">
                        <!-- Cards will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/db-operations.js"></script>
    <script>
        (function () {
            const auth = localStorage.getItem('coincubby_auth');
            if (!auth) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <script src="../js/script.js"></script>
    <script src="../js/auditlog.js"></script>



</body>

</html>
