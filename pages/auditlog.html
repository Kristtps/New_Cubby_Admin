<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log - CoinCubby Admin Panel</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auditlog.css">
    <script>
        // Apply saved theme synchronously before page renders (prevents white flash)
        (function() {
            const STORAGE_KEY = 'coincubby_theme';
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                const theme = (saved === 'light' || saved === 'dark') ? saved : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
</head>

        <aside class="sidebar">

            <nav class="nav-menu">

                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>Overview</span>
                    </a>
                    <a href="lockers.html" class="nav-item">

                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path>

        <!-- Main Content -->

                    <p class="subtitle">Every action, tracked in real time.</p>
                </div>
                <div style="position: relative; width: 300px; margin-top: 8px;">
                    <input 
                        type="text" 
                        id="auditlog-search" 
                        placeholder="Search by action, description, or user..." 
                        style="width: 100%; padding: 10px 12px 10px 40px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; color: #1f2937; background: white; transition: border-color 0.2s;"
                    >
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none;">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </div>
            </div>

            <!-- Audit Log Container -->
            <div class="auditlog-container">
                <div id="auditLogList" class="auditlog-list">
                    <!-- Audit log entries will be populated here -->
                </div>
            </div>
        </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../js/supabase-client.js"></script>
    <script src="../js/db-operations.js"></script>
    <script>
        (function() {
