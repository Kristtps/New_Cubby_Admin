<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - CoinCubby Admin Panel</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/reports.css">
    <script>
        // Apply saved theme synchronously before page renders (prevents white flash)
        (function () {
            const STORAGE_KEY = 'coincubby_theme';
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                const theme = (saved === 'light' || saved === 'dark') ? saved : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo">
                    <img src="../assets/logo.png" alt="CoinCubby Logo" width="40" height="40"
                        style="border-radius: 50%;">
                    <span>CoinCubby</span>
                </div>
                <p class="text-muted">Admin Panel</p>
            </div>

            <nav class="nav-menu">
                <div class="nav-group">
                    <a href="index.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>Overview</span>
                    </a>
                    <a href="lockers.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="11" width="18" height="11"></rect>
                            <path d="M7 11V7a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v4"></path>
                        </svg>
                        <span>Lockers</span>
                    </a>
                    <a href="customers.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>Customers</span>
                    </a>
                    <a href="transactions.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                        <span>Transactions</span>
                    </a>
                    <a href="rentals.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="1"></circle>
                            <path
                                d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6m-17.78 7.78l4.24-4.24m2.12-2.12l4.24-4.24">
                            </path>
                        </svg>
                        <span>Rentals</span>
                    </a>
                    <a href="rates.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z">
                            </path>
                        </svg>
                        <span>Rates</span>
                    </a>
                    <a href="reports.html" class="nav-item active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span>Reports</span>
                    </a>

                    <a href="feedback.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                            </path>
                        </svg>
                        <span>Feedback</span>
                    </a>
                    <a href="auditlog.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="1"></circle>
                            <path
                                d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6m-17.78 7.78l4.24-4.24m2.12-2.12l4.24-4.24">
                            </path>
                        </svg>
                        <span>Audit Log</span>
                    </a>
                </div>
            </nav>



            <a href="profile.html" class="user-profile">
                <div class="avatar" id="sidebar-avatar">A</div>
                <div class="user-info">
                    <p class="user-name" id="sidebar-name"></p>
                    <p class="user-role">Admin</p>
                </div>
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <div class="header-content">
                    <h1>Reports</h1>
                    <p class="subtitle">Graphical overview of your CoinCubby operations.</p>
                </div>
                <div class="header-actions">
                    <!-- Range Selector (right-aligned, inside header) -->
                    <div class="filter-combo">
                        <svg class="filter-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        <select id="rangeSelect" onchange="handleRangeSelect(this.value)">
                            <option value="7">Last 7 Days</option>
                            <option value="14" selected>Last 14 Days</option>
                            <option value="30">Last 30 Days</option>
                            <option value="month">This Month</option>
                            <option value="custom">Custom Range</option>
                        </select>
                    </div>
                    <button class="btn-action btn-print" onclick="printReport()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="6 9 6 2 18 2 18 9"></polyline>
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                            <rect x="6" y="14" width="12" height="8"></rect>
                        </svg>
                        Print
                    </button>
                    <button class="btn-action btn-export" onclick="exportReport()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Export
                    </button>
                </div>
            </div>

            <!-- Custom date range (shown only when Custom is selected) -->
            <div class="custom-range" id="customRange">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="color:#6b7280">
                    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <label>From <input type="date" id="dateFrom" onchange="applyCustomFilter()"></label>
                <span class="range-sep">—</span>
                <label>To <input type="date" id="dateTo" onchange="applyCustomFilter()"></label>
            </div>

            <!-- Stats Cards -->
            <div class="reports-stats">
                <div class="stat-card">
                    <span class="stat-label">TOTAL REVENUE</span>
                    <div class="stat-value">₱0.00</div>
                </div>

                <div class="stat-card">
                    <span class="stat-label">TOTAL RENTALS</span>
                    <div class="stat-value">0</div>
                </div>



                <div class="stat-card">
                    <span class="stat-label">MOST USED LOCKER</span>
                    <div class="stat-value" id="most-used-locker">-</div>
                </div>

                <div class="stat-card">
                    <span class="stat-label">MOST USED PAYMENT</span>
                    <div class="stat-value" id="most-used-payment">-</div>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="charts-grid">
                <!-- Line Chart -->
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>Revenue & Rentals — 14 Days</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>

                <!-- Donut Chart -->
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>Rentals by Size</h3>
                    </div>
                    <div class="chart-container donut-container">
                        <canvas id="rentalsBySize"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/language.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/db-operations.js"></script>
    <script>
        (function () {
            const auth = localStorage.getItem('coincubby_auth');
            if (!auth) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <script src="../js/script.js"></script>
    <script src="../js/reports.js"></script>

</body>

</html>
