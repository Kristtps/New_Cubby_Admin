<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - CoinCubby Admin Panel</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script>
        // Apply saved theme synchronously before page renders (prevents white flash)
        (function () {
            const STORAGE_KEY = 'coincubby_theme';
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                const theme = (saved === 'light' || saved === 'dark') ? saved : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
        }

        .notifications-actions {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            padding: 10px 20px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: var(--color-primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            padding: 10px 20px;
            background: var(--color-panel-bg);
            color: var(--color-text);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            background: var(--color-primary-bg);
        }

        .notifications-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .notification-item {
            background: var(--color-panel-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s, background-color 0.25s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: none;
        }

        .notification-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        /* ACTIVE / UNREAD STATE */
        .notification-item.unread {
            background: rgba(239, 68, 68, 0.04);
            border-left: 4px solid var(--color-occupied);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.08);
        }

        .notification-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* ICON CONTAINER */
        .notification-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        /* Use existing status colors for icons */
        .icon-feedback { background: var(--gradient-purple); color: white; }
        .icon-customer { background: var(--gradient-info); color: white; }
        .icon-rental { background: var(--gradient-success); color: white; }
        .icon-maintenance { background: var(--gradient-warning); color: white; }
        .icon-warning { background: var(--gradient-danger); color: white; }
        .icon-verification { background: var(--gradient-purple); color: white; }
        .icon-default { background: var(--color-border); color: var(--color-dark); }

        .notification-icon svg {
            stroke: currentColor;
            fill: none;
        }
        
        .notification-icon svg.filled {
            fill: currentColor;
            stroke: none;
        }

        /* Unread/Active Icon Highlight */
        .notification-item.unread .notification-icon {
            background: var(--gradient-danger);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            color: white;
        }

        .notification-details {
            flex: 1;
            min-width: 0;
        }

        .notification-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        /* TITLE */
        .notification-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--color-dark);
            line-height: 1.2;
            flex: 1;
            min-width: 0;
        }

        /* MESSAGE */
        .notification-message {
            font-size: 14px;
            color: var(--color-text-muted);
            line-height: 1.4;
            margin-top: 4px;
            margin-bottom: 8px;
        }

        /* DATETIME */
        .notification-datetime {
            font-size: 12px;
            color: var(--color-text-muted);
            font-weight: 600;
        }

        /* META & RELATIVE TIME */
        .notification-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .relative-time {
            font-size: 12px;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .unread-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--color-occupied);
        }

        .notification-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge-high { background: #fbbf24; color: #78350f; }
        .badge-urgent { background: #ef4444; color: #ffffff; }
        .badge-normal { background: #818cf8; color: #ffffff; }
        .badge-low { background: #9ca3af; color: #ffffff; }

        .empty-notifications {
            text-align: center;
            padding: 80px 20px;
            background: var(--color-panel-bg);
            border-radius: 16px;
            border: 1px solid var(--color-border);
        }

        .empty-notifications svg {
            margin-bottom: 24px;
            opacity: 0.4;
            color: var(--color-text-muted);
        }

        .empty-notifications h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-dark);
            margin-bottom: 8px;
        }

        .empty-notifications p {
            font-size: 14px;
            color: var(--color-text-muted);
        }
        
        /* GROUP HEADER */
        .group-header {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-text-muted);
            margin: 24px 0 12px 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* FILTER SECTION */
        .notifications-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: var(--color-panel-bg);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid var(--color-border);
            gap: 16px;
        }
        
        .search-container {
            position: relative;
            flex: 1;
            max-width: 300px;
        }
        
        .search-container svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
        }
        
        .search-container input {
            width: 100%;
            padding: 10px 10px 10px 36px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: var(--color-bg-light);
            transition: all 0.2s;
        }
        
        .search-container input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-bg);
            background: white;
        }
        
        .filter-tabs {
            display: flex;
            gap: 8px;
        }
        
        .filter-tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--color-border);
            background: transparent;
            color: var(--color-text-muted);
            transition: all 0.2s;
        }
        
        .filter-tab.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        /* Dark Mode */
        [data-theme="dark"] .notification-item:not(.unread) {
            background: var(--dark-bg-secondary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        [data-theme="dark"] .notification-title {
            color: var(--dark-text-primary);
        }

        [data-theme="dark"] .notification-message,
        [data-theme="dark"] .notification-datetime,
        [data-theme="dark"] .relative-time {
            color: var(--dark-text-secondary);
        }
        
        [data-theme="dark"] .group-header {
            color: var(--dark-text-secondary);
        }
        
        [data-theme="dark"] .notifications-toolbar {
            background: var(--dark-bg-secondary);
            border-color: var(--dark-border);
        }
        
        [data-theme="dark"] .search-container input {
            background: var(--dark-bg-tertiary);
            border-color: var(--dark-border);
            color: var(--dark-text-primary);
        }
        
        [data-theme="dark"] .filter-tab {
            border-color: var(--dark-border);
            color: var(--dark-text-secondary);
        }
        
        [data-theme="dark"] .filter-tab.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        [data-theme="dark"] .empty-notifications {
            background: var(--dark-bg-secondary);
            border-color: var(--dark-border);
        }

        [data-theme="dark"] .empty-notifications h3 {
            color: var(--dark-text-primary);
        }

        [data-theme="dark"] .btn-secondary {
            background: var(--dark-bg-tertiary);
            border-color: var(--dark-border);
            color: var(--dark-text-primary);
        }

        [data-theme="dark"] .btn-secondary:hover {
            background: rgba(239, 68, 68, 0.1);
        }
        
        .load-more-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--color-primary);
            color: white;
            text-align: center;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
            box-shadow: 0 4px 15px var(--color-shadow-hover);
        }
        
        .load-more-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
