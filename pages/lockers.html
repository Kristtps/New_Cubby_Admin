<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinCubby - Locker Management</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="8" fill="#3B82F6"/>
                        <path d="M20 10C14.48 10 10 14.48 10 20C10 25.52 14.48 30 20 30C25.52 30 30 25.52 30 20C30 14.48 25.52 10 20 10ZM20 28C15.58 28 12 24.42 12 20C12 15.58 15.58 12 20 12C24.42 12 28 15.58 28 20C28 24.42 24.42 28 20 28Z" fill="white"/>
                    </svg>
                    <span>CoinCubby</span>
                </div>
                <p class="text-muted">Admin Panel</p>
            </div>

            <nav class="nav-menu">
                <div class="nav-group">
                    <a href="index.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>Overview</span>
                    </a>
                    <a href="lockers.html" class="nav-item active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11"></rect>
                            <path d="M7 11V7a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v4"></path>
                        </svg>
                        <span>Lockers</span>
                    </a>
                    <a href="customers.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>Customers</span>
                    </a>
                    <a href="transactions.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                        <span>Transactions</span>
                    </a>
                    <a href="rates.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg>
                        <span>Rates</span>
                    </a>
                    <a href="reports.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span>Reports</span>
                    </a>
                    <a href="auditlog.html" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="1"></circle>
                            <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6m-17.78 7.78l4.24-4.24m2.12-2.12l4.24-4.24"></path>
                        </svg>
                        <span>Audit Log</span>
                    </a>
                </div>
            </nav>

            <div class="user-profile">
                <div class="avatar">A</div>
                <div class="user-info">
                    <p class="user-name">Admin</p>
                    <p class="user-role">Admin</p>
                </div>
                <a href="#" class="sign-out">Sign out</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <div class="header-with-action">
                <div>
                    <h1>Locker Management</h1>
                    <p class="subtitle">Control compartments, toggle maintenance, and configure modules.</p>
                </div>
                <div class="header-actions">
                    <button class="btn-secondary" id="add-locker-btn" style="margin-right: 10px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"></path>
                        </svg>
                        Add Locker
                    </button>
                    <button class="btn-secondary" id="add-module-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                        </svg>
                        Add Module
                    </button>
                </div>
            </div>

            <!-- Status Legend -->
            <div class="status-legend">
                <span class="legend-item">
                    <span class="legend-dot available"></span>
                    <span>Available</span>
                </span>
                <span class="legend-item">
                    <span class="legend-dot occupied"></span>
                    <span>Occupied</span>
                </span>
                <span class="legend-item">
                    <span class="legend-dot payment"></span>
                    <span>Payment Required</span>
                </span>
                <span class="legend-item">
                    <span class="legend-dot maintenance"></span>
                    <span>Maintenance</span>
                </span>
            </div>

            <!-- Module Filters -->
            <div class="module-filters" id="module-filters"></div>

            <!-- Lockers Table -->
            <div class="table-container">
                <table class="lockers-table" id="lockers-table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Size</th>
                            <th>Module</th>
                            <th>Device</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="lockers-tbody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Locker Modal -->
    <div class="modal-overlay" id="add-locker-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add Locker</h2>
                <button class="modal-close" id="modal-close-btn">&times;</button>
            </div>

            <form id="add-locker-form" class="modal-form">
                <div class="form-group">
                    <label for="locker-code">Locker Code</label>
                    <input 
                        type="text" 
                        id="locker-code" 
                        name="code" 
                        placeholder="L1, M2, S3..." 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="locker-size">Size</label>
                    <select id="locker-size" name="size" required>
                        <option value="">Select Size</option>
                        <option value="Small">Small</option>
                        <option value="Medium">Medium</option>
                        <option value="Large">Large</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="locker-module">Module</label>
                        <select id="locker-module" name="module_id" required>
                            <option value="">Select Module</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="locker-device">Device ID</label>
                        <input 
                            type="text" 
                            id="locker-device" 
                            name="device" 
                            placeholder="DEV-01" 
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="btn-modal-submit">Add Locker</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/db-operations.js"></script>
    <script>
        (function() {
            const auth = localStorage.getItem('coincubby_auth');
            if (!auth) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <script src="../js/script.js"></script>

</body>
</html>
