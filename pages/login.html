<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinCubby - Admin Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <script>
        // Apply saved theme synchronously before page renders (prevents white flash)
        (function () {
            const STORAGE_KEY = 'coincubby_theme';
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                const theme = (saved === 'light' || saved === 'dark') ? saved : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
</head>

<body>

    <div class="login-container">
        <!-- Left Side - Branding -->
        <div class="login-branding">
            <div class="brand-content">
                <div class="brand-logo">
                    <img src="../assets/logo.png" alt="CoinCubby Logo" width="80" height="80"
                        style="border-radius: 50%;">
                </div>
                <h1 class="brand-name">CoinCubby</h1>
                <p class="brand-tagline">Secure Locker Management</p>
                <p class="brand-description">Admin Control Panel</p>
            </div>

            <div class="brand-features">
                <div class="feature">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    <span>Secure Access</span>
                </div>
                <div class="feature">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11"></rect>
                        <path d="M7 11V7a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v4"></path>
                    </svg>
                    <span>Real-time Management</span>
                </div>
                <div class="feature">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 6l-9.5-1L12 0 10.5 5 1 6l8.46 7.07-2.04 9.33L12 16.43l8.58 4.97-2.04-9.33L23 6z">
                        </path>
                    </svg>
                    <span>24/7 Operations</span>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-form-container">
            <div class="login-form-wrapper">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your admin account</p>
                </div>

                <form id="loginForm" class="login-form">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                </path>
                                <polyline points="22 6 12 13 2 6"></polyline>
                            </svg>
                            <input type="email" id="email" name="email" class="form-input"
                                placeholder="admin@coincubby.com" required>
                        </div>
                        <small class="form-error" id="emailError"></small>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11"></rect>
                                <path d="M7 11V7a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v4"></path>
                            </svg>
                            <input type="password" id="password" name="password" class="form-input"
                                placeholder="••••••••" required>
                            <button type="button" class="toggle-password" id="togglePassword">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                        <small class="form-error" id="passwordError"></small>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn-login">
                        <span class="btn-text">Sign In</span>
                        <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>

                    <!-- Error Message -->
                    <div class="alert alert-error" id="loginError" style="display: none;"></div>

                    <!-- Success Message -->
                    <div class="alert alert-success" id="loginSuccess" style="display: none;"></div>
                </form>

                <!-- Demo Credentials Info -->
                <div class="demo-info">
                    <p class="demo-title">Demo Credentials:</p>
                    <div class="demo-cred">
                        <span>Email:</span>
                        <code>admin@coincubby.com</code>
                    </div>
                    <div class="demo-cred">
                        <span>Password:</span>
                        <code>password123</code>
                    </div>
                </div>

                <!-- Footer -->
                <div class="form-footer">
                    <p>Need help? <a href="#" class="support-link">Contact Support</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
